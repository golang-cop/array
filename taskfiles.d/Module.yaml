version: "3"

tasks:
  init:
    desc: Initialize the Go module
    cmds:
    - |
    
      go mod init github.com/go-composites/array

  requirements:
    desc: Add module requirements and sums
    cmds:
    - |
    
      go clean -modcache
      go get github.com/go-composites/result
      go mod tidy
